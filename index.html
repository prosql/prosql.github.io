---
layout: default
---

{% if site.active_lang %}
  {% assign t = site.data.translations[site.active_lang] %}
{% else %}
  {% assign t = site.data.translations[site.default_lang] %}
{% endif %}

<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">{{ t.read_more }}</a>
    </article>
  {% endfor %}


</div>

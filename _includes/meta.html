    <meta charset="utf-8" />
    <meta content='text/html; charset=utf-8' http-equiv='Content-Type'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0'>

    <meta name="yandex-verification" content="ed8d59c1ca8ad065" />
    <meta name="google-site-verification" content="4lM6Bf9U4jFR895lSKI5leeL6ZCHQpmQPUw3Ydg6cZU" />

    {% if site.active_lang %}
      {% assign meta_t = site.data.translations[site.active_lang] %}
    {% else %}
      {% assign meta_t = site.data.translations[site.default_lang] %}
    {% endif %}

    {% if page.excerpt %}
    <meta name="description" content="{{ page.excerpt| strip_html }}" />
    <meta property="og:description" content="{{ page.excerpt| strip_html }}" />
    {% else %}
    <meta name="description" content="{{ meta_t.site_description }}">
    <meta property="og:description" content="{{ meta_t.site_description }}" />
    {% endif %}
    <meta name="author" content="{{ meta_t.site_name }}" />

    {% if page.title %}
    <meta property="og:title" content="{{ page.title }}" />
    <meta property="twitter:title" content="{{ page.title }}" />
    {% endif %}
